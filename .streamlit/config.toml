# Clinical theme for the Deepgram Medical Transcription UI.
# Light + dark are both defined, which enables the in-app theme switcher (Settings
# menu); the palette is one Tailwind-slate family, inverted for dark. Pure
# configuration — no Python, so it never touches the test suite.

# Mode-independent settings (apply to both light and dark).
[theme]
baseRadius = "8px"
showWidgetBorder = true
linkUnderline = false                # color alone signals links — cleaner than underlines
# Typography — Inter (UI) and JetBrains Mono (JSON/code view), SELF-HOSTED from
# static/ (see the [[theme.fontFaces]] tables below + [server].enableStaticServing).
# No request ever leaves the app to a third-party font CDN — important for a PHI app;
# Streamlit falls back to the system sans / mono stack if a face fails to load.
font = "Inter"
codeFont = "'JetBrains Mono'"
# Heading scale. The app's only visible heading is the h1 st.title; this 1-element
# array calms Streamlit's shouty 2.75rem default and leaves h2–h6 at their defaults.
headingFontSizes = ["2.25rem"]       # ~36px at the 16px base (was 2.75rem / 44px)

[[theme.fontFaces]]
family = "Inter"
url = "app/static/inter-400.woff2"
weight = 400
[[theme.fontFaces]]
family = "Inter"
url = "app/static/inter-500.woff2"
weight = 500
[[theme.fontFaces]]
family = "Inter"
url = "app/static/inter-600.woff2"
weight = 600
[[theme.fontFaces]]
family = "Inter"
url = "app/static/inter-700.woff2"
weight = 700
[[theme.fontFaces]]
family = "JetBrains Mono"
url = "app/static/jetbrains-mono-400.woff2"
weight = 400
[[theme.fontFaces]]
family = "JetBrains Mono"
url = "app/static/jetbrains-mono-500.woff2"
weight = 500

# Light mode — clinical blue on white.
[theme.light]
primaryColor = "#2563EB"             # clinical blue: buttons, links, active tab underline
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9" # widget / code / container backgrounds (slate-100)
textColor = "#0F172A"                # slate-900 body text
linkColor = "#2563EB"
codeBackgroundColor = "#F1F5F9"
borderColor = "#CBD5E1"              # slate-300 widget borders
# Semantic palette — harmonizes the diarized speaker-label highlights
# (`:{color}-background[**Speaker N:**]` from _SPEAKER_COLORS) and status accents.
blueColor = "#2563EB"                # Speaker 1 (matches the clinical primary)
greenColor = "#16A34A"               # Speaker 2 / success accents
violetColor = "#7C3AED"              # Speaker 3
orangeColor = "#EA580C"              # Speaker 4
redColor = "#DC2626"                 # Speaker 5 / error accents (st.error)
grayColor = "#475569"                # Speaker 6 / unlabeled-speaker fallback (slate-600)

# Dark mode — clinical slate (light mode's slate tones inverted).
[theme.dark]
primaryColor = "#2563EB"             # kept — ≥4.5:1 contrast with white button text (clears WCAG AA)
backgroundColor = "#0F172A"          # slate-900 (deep clinical slate, not pure black)
secondaryBackgroundColor = "#1E293B" # slate-800 widget / container backgrounds
textColor = "#E2E8F0"                # slate-200 body text (≥13:1 on the background)
linkColor = "#60A5FA"                # blue-400 — brightened for dark-bg readability
codeBackgroundColor = "#1E293B"
borderColor = "#334155"              # slate-700 widget borders
# Semantic palette — brightened -400 shades so the auto-derived dark tints stay vivid.
blueColor = "#60A5FA"                # Speaker 1
greenColor = "#4ADE80"               # Speaker 2 / success accents
violetColor = "#A78BFA"              # Speaker 3
orangeColor = "#FB923C"              # Speaker 4
redColor = "#F87171"                 # Speaker 5 / error accents (st.error)
grayColor = "#94A3B8"                # Speaker 6 / unlabeled-speaker fallback (slate-400)

# Serve the bundled fonts under static/ at app/static/* (referenced by the
# [[theme.fontFaces]] URLs above). Keeps typography first-party — no font CDN.
[server]
enableStaticServing = true
