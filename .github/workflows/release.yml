name: release

# Cut a release by pushing a version tag, e.g.
#   git tag v0.8.1 && git push origin v0.8.1
# This publishes a GitHub Release for that tag with auto-generated notes. It never
# opens or approves pull requests, so it needs no `pull-requests` scope and cannot
# hit the "GitHub Actions is not permitted to create or approve pull requests"
# repo/org policy. Version bumps in pyproject.toml are made by hand before tagging.
on:
  push:
    tags:
      - "v*"

# Only the scope needed to create the GitHub Release for the pushed tag.
permissions:
  contents: write

# Serialize per tag and never abort a half-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish GitHub Release
        # `gh` is preinstalled on GitHub runners (no third-party action to
        # SHA-pin). The tag and repo come from the default GITHUB_REF_NAME /
        # GITHUB_REPOSITORY env vars — not a `${{ }}` shell interpolation — so
        # there is no script-injection surface. `--verify-tag` refuses to publish
        # if the tag is missing; `--generate-notes` builds notes from the merged
        # PRs / commits since the previous release.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
